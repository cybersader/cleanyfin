# Deploy the cleanyfin docs site (Astro + Starlight, built with bun) to GitHub Pages.
# Project site at https://cybersader.github.io/cleanyfin
# (astro.config.mjs already sets site + base: '/cleanyfin', so docs/dist is
# built with the correct base path — no path rewriting needed here).
name: Deploy docs to GitHub Pages

on:
  # Rebuild + redeploy only when the docs site or this workflow changes.
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Least-privilege token that can deploy to Pages via OIDC (official Pages pattern).
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---- Build the static site into docs/dist and upload it as a Pages artifact ----
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # Install deps in docs/. (The `preflight` step that `bun run build` triggers
      # also runs an install; running it here first is fine / idempotent.)
      - name: Install dependencies
        run: bun install
        working-directory: docs

      - name: Build site
        run: bun run build
        working-directory: docs

      # Upload docs/dist — already built with base '/cleanyfin', so it is
      # correct for the project site as-is.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

  # ---- Deploy the uploaded artifact to GitHub Pages ----
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
